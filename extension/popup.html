<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Keeper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      background: #111827;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid #1f2937;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      /* Orange gradient text matching Context Keeper v1 */
      background: linear-gradient(90deg, #FF6B35, #FF9A6C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .platform-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #9ca3af;
    }

    /* Small status dot */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4b5563;
      flex-shrink: 0;
    }

    .platform-badge.detected  .dot { background: #22c55e; }
    .platform-badge.unsupported .dot { background: #ef4444; }

    /* ── Unsupported state ─────────────────────────────────────────── */
    .unsupported-msg {
      padding: 20px 16px;
      color: #9ca3af;
      font-size: 13px;
      text-align: center;
      line-height: 1.6;
    }

    .unsupported-msg strong {
      color: #d1d5db;
    }

    /* ── Main section ──────────────────────────────────────────────── */
    .main {
      padding: 14px 16px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 9px;
    }

    /* ── Category buttons ──────────────────────────────────────────── */
    .categories {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
    }

    .cat-btn {
      flex: 1;
      padding: 9px 4px 8px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #d1d5db;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      text-align: center;
      line-height: 1.3;
    }

    .cat-btn:hover {
      border-color: #FF6B35;
      color: #FF6B35;
    }

    /* Highlighted when selected */
    .cat-btn.active {
      background: rgba(255, 107, 53, 0.12);
      border-color: #FF6B35;
      color: #FF6B35;
    }

    .cat-icon {
      display: block;
      font-size: 18px;
      margin-bottom: 3px;
    }

    /* ── Inject button ─────────────────────────────────────────────── */
    .inject-btn {
      width: 100%;
      padding: 12px;
      background: #FF6B35;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.15s, opacity 0.15s;
    }

    .inject-btn:hover:not(:disabled) {
      background: #e8602c;
    }

    .inject-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Status message ────────────────────────────────────────────── */
    .status {
      display: none;
      margin-top: 10px;
      padding: 9px 11px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1.5;
    }

    .status.success {
      display: block;
      background: rgba(20, 83, 45, 0.25);
      border: 1px solid rgba(22, 163, 74, 0.4);
      color: #4ade80;
    }

    .status.error {
      display: block;
      background: rgba(127, 29, 29, 0.25);
      border: 1px solid rgba(220, 38, 38, 0.4);
      color: #f87171;
    }

    /* ── Footer ────────────────────────────────────────────────────── */
    .footer {
      padding: 8px 16px 12px;
      border-top: 1px solid #1f2937;
      font-size: 11px;
      color: #374151;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Always-visible header -->
  <div class="header">
    <div class="title">Context Keeper</div>
    <div class="platform-badge" id="platformBadge">
      <span class="dot"></span>
      <span id="platformText">Detecting platform…</span>
    </div>
  </div>

  <!-- Shown when a supported platform is detected -->
  <div id="mainContent" style="display:none">
    <div class="main">

      <div class="section-label">Work Category</div>
      <div class="categories">
        <button class="cat-btn" data-category="coding">
          <span class="cat-icon">💻</span>Coding
        </button>
        <button class="cat-btn" data-category="writing">
          <span class="cat-icon">✍️</span>Writing
        </button>
        <button class="cat-btn" data-category="research">
          <span class="cat-icon">🔬</span>Research
        </button>
      </div>

      <button class="inject-btn" id="injectBtn" disabled>
        Inject Handoff Prompt
      </button>

      <div class="status" id="statusMsg"></div>
    </div>
    <div class="footer">Context Keeper v2 &middot; Browser Extension</div>
  </div>

  <!-- Shown when current tab is not a supported LLM platform -->
  <div id="unsupportedContent" style="display:none">
    <div class="unsupported-msg">
      Open <strong>ChatGPT, Gemini, Claude, or Kimi</strong><br>to use this extension.
    </div>
    <div class="footer">Context Keeper v2 &middot; Browser Extension</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
